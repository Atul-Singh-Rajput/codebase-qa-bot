services:

  api:
    build: .
    container_name: codebase-qa-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./chroma_store:/app/chroma_store
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codebase-qa-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
